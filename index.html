<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FT</title>
  </head>
  <body>
    <div id="app">
      <div class="viewport" data-canvas></div>
      <div class="earth-overlay" data-earth-overlay aria-hidden="true">
        <div class="earth-overlay__brand">凡拓数创发展历程</div>
        <div class="earth-overlay__heading">
          <div class="earth-overlay__title">3D可视化技术</div>
          <div class="earth-overlay__phase">PHASE ONE</div>
        </div>
        <div class="earth-overlay__triangle"></div>
        <div class="earth-overlay__orbit earth-overlay__orbit--outer"></div>
        <div class="earth-overlay__orbit earth-overlay__orbit--inner"></div>
        <div class="earth-overlay__copy">
          <p>建筑艺术空间表现3D可视化</p>
          <p>落地多个建筑艺术地标空间</p>
          <p>覆盖全球城市规划建筑地产行业</p>
        </div>
        <div class="earth-overlay__blur earth-overlay__blur--right"></div>
        <div class="earth-overlay__blur earth-overlay__blur--bottom"></div>
      </div>
      <div class="scroll-proxy" aria-hidden="true"></div>
      <div class="boot-loader" data-boot aria-live="polite" aria-busy="true">
        <div class="boot-loader__ascii" aria-hidden="true"></div>
        <span class="boot-loader__status" data-boot-label>Booting reverse-engineering workspace...</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
